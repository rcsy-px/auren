services:
  auren:
    build:
      context: .
      args:
        VERSION: ${AUREN_VERSION:-local}
    image: ${AUREN_IMAGE:-auren-dashboard}:${AUREN_VERSION:-local}
    ports:
      - "${AUREN_PORT:-8080}:8080"
    environment:
      - WEATHERAPI_KEY=${WEATHERAPI_KEY:-}
      - AUREN_RELEASE_REPO=${AUREN_RELEASE_REPO:-rcsy-px/auren}
      - AUREN_UPDATE_CHECK=${AUREN_UPDATE_CHECK:-true}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
